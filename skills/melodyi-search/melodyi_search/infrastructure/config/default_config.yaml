# melodyi-search 默认配置
providers:
  - name: minimax-cn
    api_key: ${MINIMAX_API_KEY}
    timeout_ms: 10000
    max_results: 10

  - name: tavily
    api_key: ${TAVILY_API_KEY}
    timeout_ms: 10000
    max_results: 20
    extra_params:
      depth: basic

  - name: brave
    api_key: ${BRAVE_API_KEY}
    timeout_ms: 10000
    max_results: 20

  - name: exa
    api_key: ${EXA_API_KEY}
    timeout_ms: 30000
    max_results: 10
    extra_params:
      type: auto

mode:
  comparison: true
  log_dir: ${HOME}/.melodyi-search/logs

fallback:
  retry_count: 2
  retry_delay_ms: 1000

database:
  database_path: ${HOME}/.melodyi-search/data/compare.db